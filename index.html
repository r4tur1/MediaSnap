<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediaSnap - Download Media Easily</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
</head>
<body data-theme="light">
    <header>
        <div class="container header-content">
            <div class="logo-container">
                <h1 class="logo">MediaSnap</h1>
                <p class="tagline">Paste a link. Pick a format. Download.</p>
            </div>
            <button id="theme-toggle" class="icon-btn" aria-label="Toggle Dark Mode">
                <svg id="sun-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                <svg id="moon-icon" class="hidden" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
            </button>
        </div>
    </header>

    <main class="container">
        <section id="input-section" class="card main-input-card">
            <div class="input-group">
                <input type="text" id="url-input" placeholder="Paste YouTube, Instagram, Facebook link..." aria-label="Media URL">
                <div class="input-actions">
                    <button id="paste-btn" class="secondary-btn">Paste</button>
                    <button id="fetch-btn" class="primary-btn">Fetch</button>
                </div>
            </div>
            <div id="platform-badge" class="platform-badge hidden">
                <span id="platform-icon"></span>
                <span id="platform-name"></span>
            </div>
            
            <div id="batch-toggle-container" class="batch-toggle-container">
                <label class="switch">
                    <input type="checkbox" id="batch-mode-toggle">
                    <span class="slider round"></span>
                </label>
                <span>Batch Mode</span>
            </div>

            <div id="batch-input-container" class="hidden">
                <textarea id="batch-url-input" placeholder="Paste multiple links (one per line)..." rows="5"></textarea>
                <button id="batch-fetch-btn" class="primary-btn full-width">Fetch All</button>
            </div>
        </section>

        <section id="warning-banner" class="warning-banner hidden">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
            <span id="warning-text"></span>
        </section>

        <section id="preview-container">
            <!-- Shimmer/Skeleton loader -->
            <div id="loading-skeleton" class="card preview-card skeleton hidden">
                <div class="skeleton-thumb"></div>
                <div class="skeleton-content">
                    <div class="skeleton-line title"></div>
                    <div class="skeleton-line subtitle"></div>
                    <div class="skeleton-line meta"></div>
                    <div class="skeleton-tabs"></div>
                    <div class="skeleton-pills"></div>
                </div>
            </div>

            <!-- Error message -->
            <div id="error-container" class="error-box hidden">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>
                <span id="error-message"></span>
            </div>

            <!-- Preview Card (populated by JS) -->
            <div id="preview-card" class="card preview-card hidden"></div>
            
            <!-- Batch Preview Container -->
            <div id="batch-previews" class="batch-previews hidden"></div>
        </section>

        <!-- Progress Section -->
        <section id="progress-container" class="card progress-card hidden">
            <div class="progress-info">
                <span id="progress-title">Downloading...</span>
                <span id="progress-percent">0%</span>
            </div>
            <div class="progress-bar-bg">
                <div id="progress-bar-fill" class="progress-bar-fill"></div>
            </div>
        </section>

        <section id="history-section" class="history-section">
            <div class="section-header">
                <h3>Recent Downloads</h3>
                <a href="history.html" class="view-all">View All</a>
            </div>
            <div id="history-strip" class="history-strip">
                <!-- Populated by JS -->
                <p class="empty-msg">No downloads yet.</p>
            </div>
        </section>
    </main>

    <footer class="container">
        <nav>
            <a href="index.html" class="active">Home</a>
            <a href="history.html">History</a>
            <a href="about.html">About</a>
        </nav>
        <p>&copy; 2026 MediaSnap. All rights reserved.</p>
    </footer>

    <script src="js/utils.js"></script>
    <script src="js/api.js"></script>
    <script src="js/history.js"></script>
    <script src="js/preview.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
